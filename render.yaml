# Managed Postgres for player-run persistence. Auto-provisioned by this blueprint
# and wired into the web service below as DATABASE_URL — no dashboard steps.
# NOTE: plan `free` is zero-cost but Render expires free Postgres after 30 days.
# For ongoing analytics bump this to a paid plan (e.g. basic-256mb, ~$6/mo) so the
# data is retained — one-line change, no code impact.
databases:
  - name: regicide-db
    plan: free

services:
  - type: web
    name: llgames-regicide
    runtime: node
    # NODE_ENV=production makes npm omit devDependencies, but the build tools
    # (vite/vue-tsc) and runtime (tsx) live there — the install:all script passes
    # --include=dev so they're present (else build dies with "vite: not found").
    buildCommand: npm run install:all && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Auto-injected from the regicide-db Postgres above (Render's web-service disk
      # is ephemeral, so finished runs are written to this DB — see server/db.ts).
      - key: DATABASE_URL
        fromDatabase:
          name: regicide-db
          property: connectionString
